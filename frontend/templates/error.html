<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HallucinationGuard SDK - Error</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }
        .error-container {
            background: white;
            border-radius: 10px;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 500px;
        }
        .error-icon {
            font-size: 4rem;
            color: #e74c3c;
            margin-bottom: 1rem;
        }
        .error-title {
            color: #e74c3c;
            margin-bottom: 1rem;
        }
        .error-message {
            color: #666;
            line-height: 1.6;
            margin-bottom: 2rem;
        }
        .setup-steps {
            text-align: left;
            background: #f8f9fa;
            padding: 1rem;
            border-radius: 5px;
            margin-bottom: 2rem;
        }
        .setup-steps h4 {
            margin-top: 0;
            color: #495057;
        }
        .setup-steps ol {
            margin: 0;
            padding-left: 1.5rem;
        }
        .setup-steps li {
            margin-bottom: 0.5rem;
        }
        .btn {
            background: #3498db;
            color: white;
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 5px;
            text-decoration: none;
            display: inline-block;
            font-size: 1rem;
            transition: background 0.3s;
        }
        .btn:hover {
            background: #2980b9;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-icon">
            <i class="fas fa-exclamation-triangle"></i>
        </div>
        <h1 class="error-title">SDK Not Available</h1>
        <div class="error-message">
            {{ error }}
        </div>
        
        <div class="setup-steps">
            <h4>To fix this issue:</h4>
            <ol>
                <li>Make sure you're in the project root directory</li>
                <li>Install the package in development mode: <code>pip install -e .</code></li>
                <li>Or install with all extras: <code>pip install -e ".[all]"</code></li>
                <li>Restart the frontend server</li>
            </ol>
        </div>
        
        <a href="javascript:history.back()" class="btn">
            <i class="fas fa-arrow-left"></i> Go Back
        </a>
    </div>
</body>
</html>
