name: "no_prompt_check"
description: "Legacy policy with prompt validators disabled (backward compatibility)"
latency_budget_ms: 100
risk_threshold: 0.5
enable_prompt_validators: false
prompt_injection_threshold: 0.0

validators:
  # TIER 1: Heuristics
  - name: "heuristics"
    enabled: true
    weight: 0.2
    threshold: 0.5
    timeout_ms: 5
  
  # TIER 2: Embedding Similarity
  - name: "embedding"
    enabled: true
    weight: 0.3
    threshold: 0.7
    timeout_ms: 30
  
  # TIER 3: HHEM Classifier
  - name: "hhem"
    enabled: true
    weight: 0.5
    threshold: 0.7
    timeout_ms: 80

mitigation:
  on_block: "block"
  on_timeout: "allow"
  on_error: "abstain"
