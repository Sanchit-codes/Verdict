name: "default"
description: "Balanced general-purpose policy with prompt security and all validation tiers enabled"
latency_budget_ms: 30000  # Generous budget to allow model warm-up on first request
risk_threshold: 0.5
enable_prompt_validators: true
prompt_injection_threshold: 0.3

validators:
  # Timeout budgets: Embedding 600ms, HHEM 10000ms (no limit)
  
  # TIER 0.5: Prompt Security
  - name: "prompt_structure"
    enabled: true
    weight: 0.0
    threshold: 1.0
    timeout_ms: 20
  
  - name: "prompt_injection"
    enabled: true
    weight: 0.1
    threshold: 0.7
    timeout_ms: 10
  
  # TIER 1: Heuristics
  - name: "heuristics"
    enabled: true
    weight: 0.2
    threshold: 0.5
    timeout_ms: 5
  
  # TIER 2: Embedding Similarity
  - name: "embedding"
    enabled: true
    weight: 0.3
    threshold: 0.7
    timeout_ms: 10000  # Allow up to 10s for embedding (covers cold-start model load)
  
  # TIER 3: HHEM Classifier
  - name: "hhem"
    enabled: true
    weight: 0.5
    threshold: 0.7
    timeout_ms: 10000

mitigation:
  on_block: "block"
  on_timeout: "allow"
  on_error: "abstain"

# ArmorIQ intent enforcement (disabled by default — enable to activate action enforcement)
armoriq:
  enabled: false
  mode: "stub"        # 'stub' = log only | 'enforce' = actually block violations
  on_violation: "block"

# Preprocessing (disabled by default — enable for prompt analysis + context compaction)
# Used only by Guard.generate_and_validate(); has no effect on Guard.validate()
preprocessing:
  enabled: false
  prompt_refinement: true       # let Gemini refine ambiguous prompts before generation
  context_compaction: true      # compact large contexts to fit token budget
  max_context_tokens: 2048      # target token budget after compaction
