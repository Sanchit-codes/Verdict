name: "default"
description: "Balanced general-purpose policy with prompt security and all validation tiers enabled"
latency_budget_ms: 2000
risk_threshold: 0.5
enable_prompt_validators: true
prompt_injection_threshold: 0.3

validators:
  # Timeout budgets: Embedding 600ms, HHEM 10000ms (no limit)
  
  # TIER 0.5: Prompt Security
  - name: "prompt_structure"
    enabled: true
    weight: 0.0
    threshold: 1.0
    timeout_ms: 20
  
  - name: "prompt_injection"
    enabled: true
    weight: 0.1
    threshold: 0.7
    timeout_ms: 10
  
  # TIER 1: Heuristics
  - name: "heuristics"
    enabled: true
    weight: 0.2
    threshold: 0.5
    timeout_ms: 5
  
  # TIER 2: Embedding Similarity
  - name: "embedding"
    enabled: true
    weight: 0.3
    threshold: 0.7
    timeout_ms: 600  # Updated: Conservative timeout for singleton-cached embedding model
  
  # TIER 3: HHEM Classifier
  - name: "hhem"
    enabled: true
    weight: 0.5
    threshold: 0.7
    timeout_ms: 10000

mitigation:
  on_block: "block"
  on_timeout: "allow"
  on_error: "abstain"
