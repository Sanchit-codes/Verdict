name: "chatbot"
description: "Relaxed low-latency policy for conversational chatbots (HHEM disabled)"
latency_budget_ms: 50
risk_threshold: 0.6

validators:
  - name: "heuristics"
    enabled: true
    weight: 0.4
    threshold: 0.4
    timeout_ms: 5
  
  - name: "embedding"
    enabled: true
    weight: 0.6
    threshold: 0.65
    timeout_ms: 30
  
  - name: "hhem"
    enabled: false
    weight: 0.0
    threshold: 0.7
    timeout_ms: 80

mitigation:
  on_block: "abstain"
  on_timeout: "allow"
  on_error: "abstain"
